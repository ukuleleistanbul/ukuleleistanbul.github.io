<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ukulele İstanbul – Atölye, Workshop ve Etkinlikler</title>
  <meta name="description" content="Ukulele İstanbul, 2013'ten beri İstanbul'da ukulele atölyeleri, workshoplar ve etkinlikler düzenleyen bir platformdur. Erkin Soylu önderliğinde her seviyeye özel çalışmalar.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&subset=latin-ext&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0D1B2A;
      --navy-mid: #1A2E42;
      --gold: #E8A838;
      --gold-light: #F5C96B;
      --cream: #FBF7F0;
      --text: #1A1A1A;
      --text-muted: #5a5a5a;
      --border: rgba(0,0,0,0.08);
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; color: var(--text); background: #fff; overflow-x: hidden; }

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(13,27,42,0.97);
      backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2.5rem; height: 62px;
    }
    .nav-logo { display: flex; align-items: center; text-decoration: none; }
    .nav-logo img { height: 52px; width: auto; opacity: 1; transition: opacity 0.2s; }
    .nav-links { display: flex; gap: 2.2rem; }
    .nav-links a { color: rgba(255,255,255,0.72); text-decoration: none; font-size: 0.8rem; font-weight: 400; letter-spacing: 0.08em; text-transform: uppercase; transition: color 0.2s; }
    .nav-links a:hover { color: var(--gold-light); }
    .nav-mobile-btn { display: none; background: none; border: none; cursor: pointer; padding: 4px; }
    .nav-mobile-btn span { display: block; width: 22px; height: 2px; background: rgba(255,255,255,0.7); margin: 5px 0; border-radius: 2px; }

    /* HERO */
    .hero {
      background: var(--navy);
      min-height: 90vh;
      display: flex; align-items: center;
      position: relative; overflow: hidden;
      padding: 5rem 2.5rem;
    }
    .hero-bg {
      position: absolute; inset: 0;
      background-image: url('images/hero-bg.jpg');
      background-size: cover; background-position: center;
      opacity: 0.18; z-index: 0;
    }
    .hero-inner {
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .hero-content { max-width: 580px; }
    .hero-eyebrow {
      display: inline-block; color: var(--gold); font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.18em; text-transform: uppercase;
      border: 1px solid rgba(232,168,56,0.35);
      padding: 5px 16px; border-radius: 20px; margin-bottom: 1.6rem;
    }
    .hero h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.8rem, 6vw, 4.4rem); color: #fff; line-height: 1.1; font-weight: 600; margin-bottom: 1.3rem; }
    .hero h1 em { color: var(--gold); font-style: italic; }
    .hero p { color: rgba(255,255,255,0.62); font-size: 1.05rem; line-height: 1.75; margin-bottom: 2.2rem; max-width: 460px; }
    .hero-cta { display: flex; gap: 1rem; flex-wrap: wrap; }
    .btn-primary { background: var(--gold); color: var(--navy); padding: 13px 30px; border-radius: 4px; text-decoration: none; font-weight: 600; font-size: 0.9rem; letter-spacing: 0.03em; transition: background 0.2s; display: inline-block; }
    .btn-primary:hover { background: var(--gold-light); }
    .btn-outline { border: 1px solid rgba(255,255,255,0.28); color: rgba(255,255,255,0.82); padding: 13px 30px; border-radius: 4px; text-decoration: none; font-weight: 400; font-size: 0.9rem; transition: border-color 0.2s, color 0.2s; display: inline-block; }
    .btn-outline:hover { border-color: var(--gold); color: var(--gold); }
    .hero-illustration { pointer-events: none; }
    .hero-illustration img { width: 320px; max-width: 36vw; opacity: 0.75; }

    /* SECTIONS */
    .section { padding: 5.5rem 2.5rem; max-width: 1000px; margin: 0 auto; }
    .section-label { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.7rem; }
    .section-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.1rem, 4vw, 3rem); color: var(--navy); font-weight: 600; margin-bottom: 1rem; line-height: 1.18; }
    .section-sub { color: var(--text-muted); font-size: 1rem; line-height: 1.75; max-width: 560px; margin-bottom: 3.2rem; }

    /* ATOLYE CARDS */
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem; }
    .card { border: 0.5px solid var(--border); border-radius: 10px; padding: 1.8rem 1.6rem; background: var(--cream); transition: box-shadow 0.25s, transform 0.25s; cursor: pointer; }
    .card:hover { transform: translateY(-4px); box-shadow: 0 10px 28px rgba(13,27,42,0.1); }
    .card-icon { font-size: 1.9rem; margin-bottom: 1.1rem; }
    .card h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.15rem; color: var(--navy); margin-bottom: 0.55rem; }
    .card p { color: var(--text-muted); font-size: 0.87rem; line-height: 1.65; }
    .card .card-more { display: inline-flex; align-items: center; gap: 0.3rem; font-size: 0.8rem; color: var(--gold); font-weight: 500; margin-top: 0.8rem; transition: gap 0.2s; }
    .card:hover .card-more { gap: 0.5rem; }

    /* ABOUT */
    .about-section { background: var(--navy); padding: 5.5rem 2.5rem; }
    .about-inner { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 4.5rem; align-items: center; }
    .about-text .section-label { color: var(--gold); }
    .about-text .section-title { color: #fff; margin-bottom: 1.2rem; }
    .about-text p { color: rgba(255,255,255,0.62); font-size: 0.95rem; line-height: 1.8; margin-bottom: 1rem; }
    .about-profile {
      width: 100%; max-width: 380px;
      border-radius: 12px; overflow: hidden;
      border: 3px solid rgba(232,168,56,0.25);
      aspect-ratio: 3/4; object-fit: cover;
      display: block; margin: 0 auto;
    }
    .about-profile-placeholder {
      width: 100%; max-width: 380px; aspect-ratio: 3/4;
      background: rgba(255,255,255,0.06);
      border: 2px dashed rgba(232,168,56,0.3);
      border-radius: 12px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: rgba(255,255,255,0.35); font-size: 0.85rem;
      text-align: center; padding: 2rem; margin: 0 auto;
      gap: 0.5rem;
    }
    .about-profile-placeholder .ph-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }

    /* GALERI */
    .gallery-section { padding: 5.5rem 2.5rem; background: var(--cream); }
    .gallery-inner { max-width: 1000px; margin: 0 auto; }
    .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
    .gallery-item {
      aspect-ratio: 1; border-radius: 8px; overflow: hidden;
      background: #ddd; position: relative;
    }
    .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
    .gallery-item:hover img { transform: scale(1.04); }
    .gallery-item.placeholder {
      background: rgba(13,27,42,0.06);
      border: 2px dashed rgba(13,27,42,0.15);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: var(--text-muted); font-size: 0.8rem; text-align: center; padding: 1rem; gap: 0.3rem;
    }
    .gallery-item.placeholder .ph-icon { font-size: 1.8rem; }

    /* VIDEOS */
    .videos-section { padding: 5.5rem 2.5rem; }
    .videos-inner { max-width: 1000px; margin: 0 auto; }
    .videos-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(290px, 1fr)); gap: 1.5rem; }
    .video-card { background: #fff; border-radius: 10px; overflow: hidden; border: 0.5px solid var(--border); transition: box-shadow 0.2s; }
    .video-card:hover { box-shadow: 0 6px 22px rgba(13,27,42,0.1); }
    .video-thumb { position: relative; padding-top: 56.25%; background: var(--navy-mid); overflow: hidden; }
    .video-thumb iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
    .video-info { padding: 1rem 1.3rem; }
    .video-info h4 { font-size: 0.9rem; font-weight: 500; color: var(--navy); line-height: 1.4; }
    .video-cta-card { display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 2.5rem 2rem; background: var(--cream); border-radius: 10px; border: 0.5px solid var(--border); text-align: center; }
    .video-cta-card .play-icon { font-size: 2.2rem; margin-bottom: 1rem; }
    .video-cta-card p { color: var(--text-muted); font-size: 0.88rem; margin-bottom: 1.4rem; line-height: 1.6; }

    /* CONTACT */
    .contact-section { padding: 5.5rem 2.5rem; background: var(--cream); }
    .contact-inner { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 4.5rem; align-items: start; }
    .contact-row { display: flex; align-items: center; gap: 0.9rem; margin-bottom: 1.1rem; }
    .contact-ico { width: 38px; height: 38px; background: #fff; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; border: 0.5px solid var(--border); }
    .contact-row span { color: var(--text-muted); font-size: 0.88rem; display: block; }
    .contact-row strong { color: var(--navy); font-size: 0.95rem; font-weight: 500; display: block; }
    .social-row { display: flex; gap: 0.7rem; margin-top: 1.8rem; flex-wrap: wrap; }
    .social-btn { display: flex; align-items: center; gap: 0.45rem; border: 0.5px solid var(--border); border-radius: 6px; background: #fff; padding: 9px 15px; text-decoration: none; color: var(--navy); font-size: 0.82rem; font-weight: 500; transition: border-color 0.2s, background 0.2s; }
    .social-btn:hover { background: var(--gold-light); border-color: var(--gold); }
    .quote-box { background: #fff; border-radius: 12px; padding: 2.6rem; border: 0.5px solid var(--border); }
    .quote-box blockquote { font-family: 'Cormorant Garamond', serif; font-size: 1.25rem; color: var(--navy); line-height: 1.55; margin-bottom: 0.8rem; font-style: italic; }
    .quote-box cite { color: var(--text-muted); font-size: 0.85rem; font-style: normal; }
    .quote-divider { border: none; border-top: 0.5px solid var(--border); margin: 1.8rem 0; }
    .quote-box .hint-label { font-size: 0.83rem; color: var(--text-muted); margin-bottom: 0.5rem; }
    .quote-box .hint-text { font-size: 0.9rem; color: var(--navy); line-height: 1.65; }

    /* FOOTER */
    footer { background: var(--navy); color: rgba(255,255,255,0.38); text-align: center; padding: 2.2rem; font-size: 0.8rem; letter-spacing: 0.02em; }
    footer span { color: var(--gold); }

    /* MODAL */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(13,27,42,0.7); backdrop-filter: blur(4px);
      align-items: center; justify-content: center; padding: 1.5rem;
    }
    .modal-overlay.active { display: flex; }
    .modal-box {
      background: #fff; border-radius: 14px;
      max-width: 520px; width: 100%;
      padding: 2.8rem 2.5rem 2.5rem;
      position: relative; animation: modalIn 0.22s ease;
      max-height: 90vh; overflow-y: auto;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: translateY(16px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .modal-close {
      position: absolute; top: 1.1rem; right: 1.2rem;
      background: var(--cream); border: none; cursor: pointer;
      width: 32px; height: 32px; border-radius: 50%;
      font-size: 1rem; color: var(--text-muted);
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .modal-close:hover { background: #e8e0d6; }
    .modal-icon { font-size: 2.4rem; margin-bottom: 1rem; }
    .modal-title { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; color: var(--navy); font-weight: 700; margin-bottom: 1.2rem; }
    .modal-body p { color: var(--text-muted); font-size: 0.95rem; line-height: 1.8; margin-bottom: 1rem; }
    .modal-body ul { list-style: none; padding: 0; margin-bottom: 1rem; }
    .modal-body ul li { color: var(--text-muted); font-size: 0.92rem; line-height: 1.7; padding: 0.4rem 0; border-bottom: 0.5px solid var(--border); display: flex; align-items: flex-start; gap: 0.6rem; }
    .modal-body ul li::before { content: "—"; color: var(--gold); flex-shrink: 0; }
    .modal-cta { margin-top: 1.8rem; padding-top: 1.5rem; border-top: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
    .modal-cta span { font-size: 0.82rem; color: var(--text-muted); }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .nav-mobile-btn { display: block; }
      .hero { padding: 4rem 1.5rem; min-height: 80vh; }
      .hero-inner { flex-direction: column; text-align: center; justify-content: center; gap: 2rem; }
      .hero-cta { justify-content: center; }
      .hero-illustration { display: none; }
      .section, .gallery-section, .videos-section, .contact-section { padding: 3.5rem 1.5rem; }
      .about-section { padding: 3.5rem 1.5rem; }
      .about-inner { grid-template-columns: 1fr; gap: 2.5rem; }
      .about-profile, .about-profile-placeholder { max-width: 280px; }
      .gallery-grid { grid-template-columns: repeat(2, 1fr); }
      .contact-inner { grid-template-columns: 1fr; gap: 2.5rem; }
    }
  </style>
</head>

<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-inner">
    <div class="hero-content">
      <div class="hero-eyebrow">İstanbul · Kadıköy · 2013'ten beri</div>
      <h1>Ukulele öğrenmek<br>bu kadar <em>kolay</em> olmamıştı.</h1>
      <p>Erkin Soylu önderliğinde, her seviyeye özel birebir ve grup atölyeleri. İstanbul'da ukulele kültürünü birlikte büyütüyoruz.</p>
